<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>منتجاتنا</title>
  <link rel="stylesheet" href="style.css">
  <script src="toast.js"></script>
</head>
<body>
  <div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
  </div>

  <nav>
    <div><strong>منتجاتنا</strong></div>
    <div>
      <a href="rules.html">الرئيسية</a>
      <a href="index.html">المنتجات</a>
      <a href="cart.html">السلة</a>
      <a href="contact.html">تواصل معنا</a>
    </div>
  </nav>
  <div class="container">
    <div class="product">
      <div class="product-image">
        <img src="https://via.placeholder.com/140" alt="منتج 1">
      </div>
      <div class="product-info">
        <h3>PRODUCT NAME</h3>
        <p>PRODUCT DATALIS</p>
        <div class="product-details">
          <span class="price">خمسه جنية</span>
          <span class="rating">⭐ PRODUCT RATE</span>
        </div>
        <button class="add-btn" onclick="addToCart('PRODUCT NAME', 5.00)">أضف إلى السلة</button>
      </div>
    </div>
  </div>

  <script>
    function addToCart(name, price) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({ name, price });
      localStorage.setItem('cart', JSON.stringify(cart));
      window.location.href = 'cart.html';
    }
    
  </script>
</body>
</html>
