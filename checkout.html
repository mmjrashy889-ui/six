<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تأكيد الطلب</title>
  <link rel="stylesheet" href="style.css">
  <script src="toast.js"></script> 
</head>
<body>
  <div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
  </div>

  <nav>
    <h2>تأكيد الطلب</h2>
    <a href="cart.html">العودة للسلة</a>
  </nav>

  <div class="container">
    <form class="contact-form" id="orderForm">
      <label>اسم العميل</label>
      <input type="text" name="name" required placeholder="exmple: Moaaz Ahmed">

      <label>يوزر الديسكورد</label>
      <input type="text" name="discord" required placeholder="exmple: 4w_9.">

      <label>تفاصيل إضافية</label>
      <textarea name="details" rows="4" placeholder="exmple: احتاج يكون لونه ازرق"></textarea>

      <div id="productDetails"></div>

      <button type="submit">إرسال الطلب</button>
    </form>
  </div>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const detailsDiv = document.getElementById('productDetails');

    if (cart.length === 0) {
      detailsDiv.innerHTML = "<p style='color: #aaa;'>لا يوجد منتجات.</p>";
    } else {
      let html = "<h3>المنتجات:</h3><ul>";
      cart.forEach(p => {
        html += `<li>${p.name} - ${p.price} EGP</li>`;
      });
      html += "</ul>";
      detailsDiv.innerHTML = html;
    }

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name = this.name.value;
      const discord = this.discord.value;
      const details = this.details.value;
      const orderId = Math.floor(100000 + Math.random() * 900000); // رقم عشوائي 6 خانات

      let productsList = cart.map(p => `• ${p.name} - ${p.price} EGP`).join('\n');

      const webhookData = {
        embeds: [{
          title: `📦 طلب جديد رقم #${orderId}`,
          color: 3447003,
          fields: [
            { name: "👤 الاسم", value: name, inline: true },
            { name: "🕹️ ديسكورد", value: discord, inline: true },
            { name: "🛒 المنتجات", value: productsList || 'لا يوجد', inline: false },
            { name: "📝 تفاصيل إضافية", value: details || 'لا يوجد', inline: false }
          ],
          footer: { text: "your server name - Order System" },
          timestamp: new Date().toISOString()
        }]
      };

      try {
        await fetch("your webhook url", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(webhookData)
        });

        showToast(`✅ تم إرسال الطلب بنجاح! رقم طلبك هو: #${orderId}`, "success");

        localStorage.removeItem('cart');
        this.reset();

      } catch (err) {
        showToast("❌ لقد حدث خطأ ما  ", "error");
        console.error(err);
      }
    });
  </script>
</body>
</html>
