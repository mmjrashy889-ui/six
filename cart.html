<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سلة الشراء</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
  </div>

  <nav>
    <h2>سلة المشتريات</h2>
      <a href="index.html">العودة الي المتجر</a>
  </nav>

  <div class="container" id="cart-container"></div>

  <div class="container" style="margin-top: 20px;">
    <button class="add-btn" onclick="clearCart()">🗑️ تصفير السلة</button>
    <button class="add-btn" onclick="confirmOrder()">✅ تأكيد الطلب</button>
  </div>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const container = document.getElementById('cart-container');

    if (cart.length === 0) {
      container.innerHTML = '<p style="color: #aaa;">السلة فارغة حالياً.</p>';
    } else {
      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        const productEl = document.createElement('div');
        productEl.className = 'product';
        productEl.innerHTML = `
          <div class="product-info">
            <h3>${item.name}</h3>
            <div class="product-details">
              <span class="price">${item.price} EGP</span>
            </div>
          </div>
        `;
        container.appendChild(productEl);
      });

      const totalEl = document.createElement('div');
      totalEl.className = 'rules-section';
      totalEl.innerHTML = `<h2>الإجمالي: ${total} EGP</h2>`;
      container.appendChild(totalEl);
    }

    function clearCart() {
      localStorage.removeItem('cart');
      location.reload();
    }

    function confirmOrder() {
      window.location.href = 'checkout.html';
    }
  </script>
</body>
</html>
